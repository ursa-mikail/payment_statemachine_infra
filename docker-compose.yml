services:
  # ── Go Payment Engine ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: payment-backend
    restart: unless-stopped
    ports:
      - "8080:8080"       # Expose directly for debugging/curl
    environment:
      - TZ=UTC
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - payment-net

  # ── React TypeScript Dashboard ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: payment-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"       # Open http://localhost:3000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - payment-net

networks:
  payment-net:
    driver: bridge
